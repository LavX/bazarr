# =============================================================================
# Bazarr+ Docker Compose
# =============================================================================
# Production deployment configuration
#
# Usage:
#   docker compose up -d
#
# Environment variables can be set in a .env file or directly in the environment
# =============================================================================

services:
  # FlareSolverr (strongly recommended)
  # The OpenSubtitles.org provider is a native Provider Hub plugin in Bazarr+.
  # It scrapes in-process with ai-cloudscraper, and falls back to FlareSolverr
  # when OpenSubtitles.org returns a Cloudflare browser challenge. After you
  # install the OpenSubtitles.org plugin from the Marketplace, set its
  # "FlareSolverr URL" to http://flaresolverr:8191/v1 in the provider settings.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL:-info}
      - TZ=${TZ:-UTC}
    networks:
      - bazarr-network

  bazarr:
    image: ghcr.io/lavx/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    depends_on:
      - flaresolverr

    ports:
      - "${BAZARR_PORT:-6767}:6767"
    
    environment:
      # User/Group ID for file permissions
      # Match these to your media user on the host
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      
      # Timezone (e.g., Europe/Budapest, America/New_York)
      - TZ=${TZ:-UTC}

    volumes:
      # Configuration directory - contains database, logs, and settings
      - ${CONFIG_PATH:-./config}:/config
      
      # Media directories - adjust paths to match your setup
      # Movies library
      - ${MOVIES_PATH:-/path/to/movies}:/movies
      
      # TV Shows library
      - ${TV_PATH:-/path/to/tv}:/tv
      
      # Optional: Additional media paths
      # - /path/to/anime:/anime
      # - /path/to/downloads:/downloads
    
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6767/_supervisor/status | grep -q '\"running\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    networks:
      - bazarr-network
    
    # Optional: Resource limits
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

networks:
  bazarr-network:
    driver: bridge

# =============================================================================
# Example .env file contents:
# =============================================================================
# BAZARR_PORT=6767
# FLARESOLVERR_PORT=8191
# PUID=1000
# PGID=1000
# TZ=Europe/Budapest
# CONFIG_PATH=./config
# MOVIES_PATH=/mnt/media/movies
# TV_PATH=/mnt/media/tv
# =============================================================================