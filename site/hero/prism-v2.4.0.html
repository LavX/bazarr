<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Bazarr+ v2.4.0 Prism Hero</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #121125; overflow: hidden; }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
  canvas { display: block; position: absolute; top: 0; left: 0; }
</style>
</head>
<body>
<script>
// Bazarr+ v2.4.0 Prism hero generator.
// Two glass prisms: the first splits one warm Bazarr+ beam into a brand-toned
// spread (one -> many), the second recombines it into a single clean beam
// (many -> one). The single endpoint splits into many tenants/scopes/providers,
// and the many sources compose back into one subtitle output.
// Brand palette only (amber -> cream -> cyan-pulse). No off-brand rainbow.
//
// Tuned for crisp glass over haze: real refracting glass bodies (frosted body,
// specular sheen, internal reflections, beveled Fresnel edges) with restrained,
// non-bloomy glows, over the canonical navy atmosphere, top-left "Bazarr+"
// block, and film grain.
//
// Query params: ?w=1920&h=1080 ; ?seed=240. Drawn once, no animation.

const params = new URLSearchParams(location.search);
const W = parseInt(params.get('w') || '1920', 10);
const H = parseInt(params.get('h') || '1080', 10);
const SEED = parseInt(params.get('seed') || '240', 10);
const S = Math.min(W, H);

const NAVY = '#121125';
const AMBER = '#e68a00';
const AMBER_BRIGHT = '#ffb347';
const CREAM = '#fff8e1';
const CYAN_PULSE = '#7fe9ff';

// Brand-palette dispersion: warm-to-cool across Bazarr+ colors only. No ROYGBIV.
const SPECTRUM = [
  [255, 138, 40],  // deep amber
  [255, 170, 70],  // amber
  [255, 206, 130], // gold
  [255, 248, 225], // cream (bright middle)
  [150, 236, 252], // pale cyan
  [95, 224, 255],  // cyan-pulse
  [74, 178, 255],  // cool blue-cyan
];

const canvas = document.createElement('canvas');
canvas.width = W;
canvas.height = H;
document.body.appendChild(canvas);

const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';

// Offscreen background only, used to refract the scene through the glass.
const off = document.createElement('canvas');
off.width = W;
off.height = H;
const octx = off.getContext('2d');
octx.imageSmoothingEnabled = true;
octx.imageSmoothingQuality = 'high';

let rng = mulberry32(SEED);

// --- Geometry (W/H/S fractions so everything scales to 2x renders) ---------
const A_APEX = { x: W * 0.375, y: H * 0.375 };
const A_BL = { x: W * 0.375 - S * 0.15, y: H * 0.375 + S * 0.30 };
const A_BR = { x: W * 0.375 + S * 0.15, y: H * 0.375 + S * 0.30 };

const B_APEX = { x: W * 0.80, y: H * 0.605 };
const B_TL = { x: W * 0.80 - S * 0.15, y: H * 0.605 - S * 0.30 };
const B_TR = { x: W * 0.80 + S * 0.15, y: H * 0.605 - S * 0.30 };

const ENTRY_A = lerpPt(A_APEX, A_BL, 0.44);
const EXIT_A = lerpPt(A_APEX, A_BR, 0.55);
const BEAM_IN = { x: -W * 0.03, y: H * 0.49 };

const BF_WARM = lerpPt(B_APEX, B_TL, 0.08);
const BF_COOL = lerpPt(B_APEX, B_TL, 0.92);
const EXIT_B = lerpPt(B_APEX, B_TR, 0.40);
const BEAM_OUT = { x: W * 1.04, y: H * 0.12 };

drawHero();

function drawHero() {
  paintBackground(octx);
  ctx.drawImage(off, 0, 0);
  drawGroundReflection();
  drawBridgeBacking();
  drawBeam(BEAM_IN, ENTRY_A, false);
  drawPrism(A_APEX, A_BL, A_BR, A_APEX, A_BL);
  drawInternalA();
  drawSpread();
  drawPrism(B_APEX, B_TL, B_TR, B_APEX, B_TR);
  drawRecombine();
  drawBeam(EXIT_B, BEAM_OUT, true);
  drawCaustics();
  drawBokeh();
  drawFlares();
  drawText();
  drawVignette();
  drawFilmGrain();
}

// ---------------------------------------------------------------------------
function paintBackground(c) {
  c.fillStyle = NAVY;
  c.fillRect(0, 0, W, H);

  const base = c.createLinearGradient(0, 0, W, H);
  base.addColorStop(0, '#0b0a1a');
  base.addColorStop(0.5, NAVY);
  base.addColorStop(1, '#181640');
  c.fillStyle = base;
  c.fillRect(0, 0, W, H);

  radialFill(c, W * 0.15, H * 0.17, S * 0.70, [
    ['rgba(230, 138, 0, 0.16)', 0],
    ['rgba(255, 179, 71, 0.045)', 0.45],
    ['rgba(230, 138, 0, 0)', 1],
  ]);
  radialFill(c, W * 0.90, H * 0.86, S * 0.80, [
    ['rgba(127, 233, 255, 0.11)', 0],
    ['rgba(90, 169, 255, 0.04)', 0.42],
    ['rgba(127, 233, 255, 0)', 1],
  ]);
  radialFill(c, W * 0.55, H * 0.52, S * 0.92, [
    ['rgba(124, 92, 255, 0.11)', 0],
    ['rgba(124, 92, 255, 0.035)', 0.5],
    ['rgba(124, 92, 255, 0)', 1],
  ]);

  c.save();
  c.globalCompositeOperation = 'screen';
  const fog = [
    [W * 0.22, H * 0.30, S * 0.32, '#ffb347', 0.038],
    [W * 0.72, H * 0.62, S * 0.38, '#7fe9ff', 0.034],
    [W * 0.50, H * 0.84, S * 0.44, '#8a6bff', 0.038],
  ];
  for (const [x, y, r, col, a] of fog) {
    c.filter = `blur(${bpx(0.05)})`;
    gGlow(c, x, y, r, col, a);
  }
  c.filter = 'none';
  c.restore();

  c.save();
  c.globalCompositeOperation = 'screen';
  for (let i = 0; i < 260; i++) {
    const x = rand(0, W);
    const y = rand(0, H);
    const r = rng() < 0.92 ? rand(0.35, 1.05) : rand(1.3, 1.9);
    const a = rng() < 0.86 ? rand(0.05, 0.28) : rand(0.36, 0.62);
    c.fillStyle = `rgba(255, 248, 225, ${a})`;
    c.beginPath();
    c.arc(x, y, r, 0, Math.PI * 2);
    c.fill();
  }
  c.restore();
}

function drawGroundReflection() {
  ctx.save();
  const g = ctx.createLinearGradient(0, H * 0.80, 0, H);
  g.addColorStop(0, 'rgba(124, 92, 255, 0)');
  g.addColorStop(0.55, 'rgba(120, 150, 200, 0.04)');
  g.addColorStop(1, 'rgba(150, 180, 220, 0.08)');
  ctx.fillStyle = g;
  ctx.fillRect(0, H * 0.80, W, H * 0.20);
  ctx.restore();
}

// Restrained luminous body filling the corridor the spread travels through.
function drawBridgeBacking() {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.filter = `blur(${bpx(0.05)})`;
  const mid = lerpPt(EXIT_A, lerpPt(BF_WARM, BF_COOL, 0.5), 0.5);
  gGlow(ctx, mid.x - S * 0.05, mid.y + S * 0.04, S * 0.42, '#ffce92', 0.045);
  gGlow(ctx, mid.x + S * 0.1, mid.y - S * 0.05, S * 0.36, '#8fd0ff', 0.04);
  ctx.filter = 'none';
  ctx.restore();
}

// ---------------------------------------------------------------------------
// Single white beams (in / out): tighter halo + sharp core + a few motes
// ---------------------------------------------------------------------------
function drawBeam(p, q, withMotes) {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.lineCap = 'round';
  for (const [w, a, blur] of [[0.022, 0.07, 0.016], [0.012, 0.11, 0.007]]) {
    ctx.filter = `blur(${bpx(blur)})`;
    const grad = ctx.createLinearGradient(p.x, p.y, q.x, q.y);
    grad.addColorStop(0, 'rgba(255, 236, 190, 0)');
    grad.addColorStop(0.5, `rgba(255, 234, 184, ${a})`);
    grad.addColorStop(1, `rgba(255, 246, 216, ${a})`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = S * w;
    strokeSeg(p, q);
  }
  ctx.filter = 'none';
  const core = ctx.createLinearGradient(p.x, p.y, q.x, q.y);
  core.addColorStop(0, 'rgba(255, 248, 225, 0.12)');
  core.addColorStop(0.5, 'rgba(255, 250, 232, 0.6)');
  core.addColorStop(1, 'rgba(255, 255, 246, 0.9)');
  ctx.strokeStyle = core;
  ctx.lineWidth = S * 0.0032;
  strokeSeg(p, q);

  if (withMotes) {
    const d = norm(sub(q, p));
    const n = { x: -d.y, y: d.x };
    const len = dist(p, q);
    for (let i = 0; i < 30; i++) {
      const t = rng();
      const o = rand(-S * 0.012, S * 0.012);
      const x = p.x + d.x * len * t + n.x * o;
      const y = p.y + d.y * len * t + n.y * o;
      ctx.fillStyle = `rgba(255, 244, 214, ${rand(0.05, 0.22)})`;
      ctx.beginPath();
      ctx.arc(x, y, rand(S * 0.0005, S * 0.0015), 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

// ---------------------------------------------------------------------------
// Glass prism body: refraction + frosted body + specular + reflections + bevel
// ---------------------------------------------------------------------------
function drawPrism(p0, p1, p2, sheenA, sheenB) {
  const cen = { x: (p0.x + p1.x + p2.x) / 3, y: (p0.y + p1.y + p2.y) / 3 };
  const top = Math.min(p0.y, p1.y, p2.y);
  const bot = Math.max(p0.y, p1.y, p2.y);
  const span = bot - top;

  ctx.save();
  pathTri(p0, p1, p2);
  ctx.clip();

  // refract the scene behind: a magnified, lightly blurred slice
  ctx.save();
  ctx.filter = `blur(${bpx(0.005)})`;
  ctx.translate(cen.x, cen.y);
  ctx.scale(1.26, 1.26);
  ctx.translate(-cen.x - S * 0.026, -cen.y + S * 0.014);
  ctx.globalAlpha = 0.95;
  ctx.drawImage(off, 0, 0);
  ctx.restore();

  // glass tint: cool at top, warm pooling at the base
  const tint = ctx.createLinearGradient(0, top, 0, bot);
  tint.addColorStop(0, 'rgba(150, 210, 245, 0.12)');
  tint.addColorStop(0.5, 'rgba(255, 248, 225, 0.05)');
  tint.addColorStop(1, 'rgba(255, 168, 70, 0.13)');
  ctx.fillStyle = tint;
  ctx.fillRect(0, 0, W, H);

  // frosted luminous body
  ctx.globalCompositeOperation = 'screen';
  ctx.filter = `blur(${bpx(0.03)})`;
  gGlow(ctx, cen.x, cen.y + span * 0.1, span * 0.55, '#bfe0ff', 0.06);
  gGlow(ctx, cen.x, bot - span * 0.18, span * 0.4, '#ffd9a0', 0.07);
  ctx.filter = 'none';

  // broad specular sheen down the lit face
  ctx.filter = `blur(${bpx(0.018)})`;
  ctx.lineCap = 'round';
  const sh = ctx.createLinearGradient(sheenA.x, sheenA.y, sheenB.x, sheenB.y);
  sh.addColorStop(0, 'rgba(255, 252, 240, 0.22)');
  sh.addColorStop(1, 'rgba(255, 252, 240, 0)');
  ctx.strokeStyle = sh;
  ctx.lineWidth = S * 0.05;
  strokeSeg(sheenA, sheenB);
  ctx.filter = 'none';

  // crisp specular highlight just inside the lit edge
  const nrm = norm({ x: -(sheenB.y - sheenA.y), y: sheenB.x - sheenA.x });
  const hiA = lerpPt(sheenA, sheenB, 0.08);
  const hiB = lerpPt(sheenA, sheenB, 0.6);
  ctx.strokeStyle = 'rgba(255, 255, 248, 0.5)';
  ctx.lineWidth = S * 0.0016;
  strokeSeg(
    { x: hiA.x + nrm.x * S * 0.014, y: hiA.y + nrm.y * S * 0.014 },
    { x: hiB.x + nrm.x * S * 0.014, y: hiB.y + nrm.y * S * 0.014 }
  );

  // faint internal reflections
  ctx.strokeStyle = 'rgba(200, 230, 255, 0.16)';
  ctx.lineWidth = S * 0.0012;
  strokeSeg(lerpPt(p0, p1, 0.32), lerpPt(p0, p2, 0.68));
  ctx.strokeStyle = 'rgba(255, 228, 188, 0.12)';
  ctx.lineWidth = S * 0.001;
  strokeSeg(lerpPt(p1, p2, 0.28), lerpPt(p0, p1, 0.7));
  ctx.restore();

  // edges: tight glow + bright Fresnel core + inner bevel for thickness
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  ctx.filter = `blur(${bpx(0.008)})`;
  ctx.strokeStyle = 'rgba(255, 226, 170, 0.3)';
  ctx.lineWidth = S * 0.0075;
  pathTri(p0, p1, p2);
  ctx.stroke();
  ctx.filter = 'none';
  ctx.strokeStyle = 'rgba(255, 253, 243, 0.96)';
  ctx.lineWidth = S * 0.0032;
  pathTri(p0, p1, p2);
  ctx.stroke();
  const i0 = lerpPt(p0, cen, 0.1);
  const i1 = lerpPt(p1, cen, 0.1);
  const i2 = lerpPt(p2, cen, 0.1);
  ctx.strokeStyle = 'rgba(190, 225, 255, 0.32)';
  ctx.lineWidth = S * 0.0016;
  pathTri(i0, i1, i2);
  ctx.stroke();
  ctx.filter = `blur(${bpx(0.003)})`;
  for (const p of [p0, p1, p2]) gGlow(ctx, p.x, p.y, S * 0.03, CREAM, 0.5);
  ctx.filter = 'none';
  ctx.restore();
}

function drawInternalA() {
  ctx.save();
  pathTri(A_APEX, A_BL, A_BR);
  ctx.clip();
  ctx.globalCompositeOperation = 'screen';
  ctx.lineCap = 'round';
  ctx.filter = `blur(${bpx(0.008)})`;
  const ig = ctx.createLinearGradient(ENTRY_A.x, ENTRY_A.y, EXIT_A.x, EXIT_A.y);
  ig.addColorStop(0, 'rgba(255, 250, 232, 0.55)');
  ig.addColorStop(1, 'rgba(255, 236, 196, 0.42)');
  ctx.strokeStyle = ig;
  ctx.lineWidth = S * 0.01;
  strokeSeg(ENTRY_A, EXIT_A);
  ctx.filter = 'none';
  ctx.strokeStyle = 'rgba(255, 252, 240, 0.85)';
  ctx.lineWidth = S * 0.0024;
  strokeSeg(ENTRY_A, EXIT_A);
  for (let k = -1; k <= 1; k += 2) {
    const col = k < 0 ? '255, 176, 80' : '150, 220, 255';
    ctx.strokeStyle = `rgba(${col}, 0.25)`;
    ctx.lineWidth = S * 0.0014;
    strokeSeg(ENTRY_A, { x: EXIT_A.x, y: EXIT_A.y + k * S * 0.026 });
  }
  ctx.restore();
}

// ONE -> MANY: dispersed fan from A's exit, landing across B's left face.
function drawSpread() {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.lineCap = 'round';

  // soft body (restrained)
  ctx.filter = `blur(${bpx(0.013)})`;
  for (let j = 0; j <= 80; j++) {
    const t = j / 80;
    const end = lerpPt(BF_WARM, BF_COOL, t);
    const [r, g, b] = spectrumColor(t);
    const grad = ctx.createLinearGradient(EXIT_A.x, EXIT_A.y, end.x, end.y);
    grad.addColorStop(0, `rgba(${r},${g},${b},0)`);
    grad.addColorStop(0.12, `rgba(${r},${g},${b},0.12)`);
    grad.addColorStop(0.85, `rgba(${r},${g},${b},0.09)`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = S * 0.009;
    strokeSeg(EXIT_A, end);
  }
  ctx.filter = 'none';

  // crisp readable band
  for (let j = 0; j <= 200; j++) {
    const t = j / 200;
    const end = lerpPt(BF_WARM, BF_COOL, t);
    const [r, g, b] = spectrumColor(t);
    const grad = ctx.createLinearGradient(EXIT_A.x, EXIT_A.y, end.x, end.y);
    grad.addColorStop(0, `rgba(255,255,250,0)`);
    grad.addColorStop(0.05, `rgba(255,255,250,0.22)`);
    grad.addColorStop(0.18, `rgba(${r},${g},${b},0.55)`);
    grad.addColorStop(0.9, `rgba(${r},${g},${b},0.4)`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0.16)`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = S * 0.006;
    strokeSeg(EXIT_A, end);
  }

  // god-ray striations
  for (let i = 0; i < 70; i++) {
    const t = rng();
    const end0 = lerpPt(BF_WARM, BF_COOL, t);
    const end = lerpPt(EXIT_A, end0, rand(0.5, 1.04));
    const [r, g, b] = spectrumColor(t);
    const grad = ctx.createLinearGradient(EXIT_A.x, EXIT_A.y, end.x, end.y);
    grad.addColorStop(0, `rgba(${r},${g},${b},0)`);
    grad.addColorStop(0.12, `rgba(255,255,255,${rand(0.06, 0.16)})`);
    grad.addColorStop(0.4, `rgba(${r},${g},${b},${rand(0.14, 0.32)})`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = S * rand(0.0006, 0.0013);
    strokeSeg(EXIT_A, end);
  }

  // lit motes
  for (let i = 0; i < 60; i++) {
    const t = rng();
    const base = lerpPt(EXIT_A, lerpPt(BF_WARM, BF_COOL, t), rand(0.15, 0.98));
    const [r, g, b] = spectrumColor(t);
    ctx.fillStyle = `rgba(${r},${g},${b},${rand(0.1, 0.4)})`;
    ctx.beginPath();
    ctx.arc(base.x + rand(-S * 0.01, S * 0.01), base.y + rand(-S * 0.01, S * 0.01), rand(S * 0.0005, S * 0.0018), 0, Math.PI * 2);
    ctx.fill();
  }

  // small undispersed core at A's exit
  ctx.filter = `blur(${bpx(0.004)})`;
  const wedge = ctx.createRadialGradient(EXIT_A.x, EXIT_A.y, 0, EXIT_A.x, EXIT_A.y, S * 0.05);
  wedge.addColorStop(0, 'rgba(255,255,250,0.35)');
  wedge.addColorStop(1, 'rgba(255,255,250,0)');
  ctx.fillStyle = wedge;
  ctx.beginPath();
  ctx.arc(EXIT_A.x, EXIT_A.y, S * 0.05, 0, Math.PI * 2);
  ctx.fill();
  ctx.filter = 'none';
  ctx.restore();
}

// MANY -> ONE: inside B the colours converge to EXIT_B, merging back to white.
function drawRecombine() {
  ctx.save();
  pathTri(B_APEX, B_TL, B_TR);
  ctx.clip();
  ctx.globalCompositeOperation = 'screen';
  ctx.lineCap = 'round';
  ctx.filter = `blur(${bpx(0.009)})`;
  for (let j = 0; j <= 70; j++) {
    const t = j / 70;
    const start = lerpPt(BF_WARM, BF_COOL, t);
    const [r, g, b] = spectrumColor(t);
    const grad = ctx.createLinearGradient(start.x, start.y, EXIT_B.x, EXIT_B.y);
    grad.addColorStop(0, `rgba(${r},${g},${b},0.35)`);
    grad.addColorStop(0.7, `rgba(${r},${g},${b},0.18)`);
    grad.addColorStop(1, `rgba(255,255,250,0.32)`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = S * 0.005;
    strokeSeg(start, EXIT_B);
  }
  ctx.filter = `blur(${bpx(0.005)})`;
  const knot = ctx.createRadialGradient(EXIT_B.x, EXIT_B.y, 0, EXIT_B.x, EXIT_B.y, S * 0.05);
  knot.addColorStop(0, 'rgba(255,255,250,0.45)');
  knot.addColorStop(1, 'rgba(255,255,250,0)');
  ctx.fillStyle = knot;
  ctx.beginPath();
  ctx.arc(EXIT_B.x, EXIT_B.y, S * 0.05, 0, Math.PI * 2);
  ctx.fill();
  ctx.filter = 'none';
  ctx.restore();
}

function drawCaustics() {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const baseX = lerpPt(BF_WARM, BF_COOL, 0.5).x - S * 0.1;
  const baseY = H * 0.88;
  for (let i = 0; i < 6; i++) {
    const t = i / 5;
    const [r, g, b] = spectrumColor(t);
    const y0 = baseY + (t - 0.5) * S * 0.14 + rand(-S * 0.01, S * 0.01);
    const x0 = baseX + rand(-S * 0.05, S * 0.05);
    const sp = S * rand(0.26, 0.46);
    const amp = S * rand(0.01, 0.024);
    ctx.filter = `blur(${bpx(rand(0.006, 0.012))})`;
    ctx.strokeStyle = `rgba(${r},${g},${b},${rand(0.12, 0.28)})`;
    ctx.lineWidth = S * rand(0.0014, 0.003);
    ctx.beginPath();
    for (let s2 = 0; s2 <= 1.0001; s2 += 0.04) {
      const x = x0 + s2 * sp;
      const y = y0 + Math.sin(s2 * Math.PI * rand(2.4, 3.2) + i) * amp;
      if (s2 === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  ctx.filter = 'none';
  for (let i = 0; i < 30; i++) {
    const t = rng();
    const [r, g, b] = spectrumColor(t);
    ctx.fillStyle = `rgba(${r},${g},${b},${rand(0.14, 0.38)})`;
    ctx.beginPath();
    ctx.arc(baseX + rand(-S * 0.05, S * 0.5), baseY + rand(-S * 0.1, S * 0.1), rand(S * 0.0005, S * 0.0018), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawBokeh() {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const orbs = [
    [W * 0.46, H * 0.24, S * 0.045, '#ffb347', 0.055],
    [W * 0.95, H * 0.55, S * 0.06, '#7fe9ff', 0.05],
    [W * 0.30, H * 0.88, S * 0.045, '#ffd9a0', 0.06],
    [W * 0.66, H * 0.90, S * 0.04, '#8fb8ff', 0.045],
  ];
  for (const [x, y, r, col, a] of orbs) {
    ctx.filter = `blur(${bpx(0.016)})`;
    gGlow(ctx, x, y, r, col, a);
    ctx.filter = `blur(${bpx(0.004)})`;
    ctx.strokeStyle = withAlpha(col, a * 0.7);
    ctx.lineWidth = S * 0.0016;
    ctx.beginPath();
    ctx.arc(x, y, r * 0.82, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.filter = 'none';
  ctx.restore();
}

function drawFlares() {
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  for (const p of [EXIT_A, EXIT_B]) {
    ctx.filter = `blur(${bpx(0.007)})`;
    gGlow(ctx, p.x, p.y, S * 0.05, '#fff3d0', 0.32);
    ctx.filter = 'none';
    gGlow(ctx, p.x, p.y, S * 0.018, '#ffffff', 0.45);
  }
  ctx.filter = `blur(${bpx(0.005)})`;
  gGlow(ctx, ENTRY_A.x, ENTRY_A.y, S * 0.028, CREAM, 0.3);
  ctx.filter = 'none';
  ctx.restore();
}

function drawText() {
  const padX = W * 0.085;
  const baseY = H * 0.165;
  const titleSize = Math.round(H * 0.086);

  ctx.save();
  ctx.fillStyle = CREAM;
  ctx.shadowColor = 'rgba(0, 0, 0, 0.72)';
  ctx.shadowBlur = Math.round(H * 0.016);
  ctx.textBaseline = 'top';
  ctx.font = `800 ${titleSize}px -apple-system, "Segoe UI", system-ui, sans-serif`;
  ctx.fillText('Bazarr', padX, baseY);

  const baseW = ctx.measureText('Bazarr').width;
  const plusSize = Math.round(titleSize * 0.72);
  ctx.font = `900 ${plusSize}px -apple-system, "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = AMBER;
  ctx.fillText('+', padX + baseW + Math.round(titleSize * 0.035), baseY - Math.round(titleSize * 0.045));
  ctx.restore();

  ctx.save();
  ctx.shadowColor = 'rgba(0, 0, 0, 0.74)';
  ctx.shadowBlur = Math.round(H * 0.014);
  ctx.textBaseline = 'top';
  const subSize = Math.round(H * 0.037);
  ctx.font = `500 ${subSize}px -apple-system, "Segoe UI", system-ui, sans-serif`;
  ctx.fillStyle = 'rgba(255, 248, 225, 0.94)';
  const subY = baseY + Math.round(H * 0.115);
  ctx.fillText('V2.4.0 Released', padX, subY);

  const codeY = subY + Math.round(subSize * 1.48);
  ctx.fillStyle = 'rgba(255, 248, 225, 0.94)';
  ctx.fillText('Codename: ', padX, codeY);
  const cwidth = ctx.measureText('Codename: ').width;
  ctx.fillStyle = AMBER;
  ctx.font = `700 ${subSize}px -apple-system, "Segoe UI", system-ui, sans-serif`;
  ctx.fillText('Prism', padX + cwidth, codeY);
  ctx.restore();
}

function drawVignette() {
  ctx.save();
  const v = ctx.createRadialGradient(W * 0.5, H * 0.48, S * 0.33, W * 0.5, H * 0.5, S * 1.02);
  v.addColorStop(0, 'rgba(0, 0, 0, 0)');
  v.addColorStop(0.7, 'rgba(4, 3, 12, 0.16)');
  v.addColorStop(1, 'rgba(4, 3, 12, 0.56)');
  ctx.fillStyle = v;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function drawFilmGrain() {
  const tileSize = 256;
  const tile = document.createElement('canvas');
  tile.width = tileSize;
  tile.height = tileSize;
  const tctx = tile.getContext('2d');
  const image = tctx.createImageData(tileSize, tileSize);
  for (let y = 0; y < tileSize; y++) {
    for (let x = 0; x < tileSize; x++) {
      const v = Math.floor(rand(0, 255));
      const i = (y * tileSize + x) * 4;
      image.data[i] = v;
      image.data[i + 1] = v;
      image.data[i + 2] = v;
      image.data[i + 3] = 255;
    }
  }
  tctx.putImageData(image, 0, 0);

  ctx.save();
  ctx.globalAlpha = 0.046;
  ctx.globalCompositeOperation = 'overlay';
  ctx.fillStyle = ctx.createPattern(tile, 'repeat');
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// ---- helpers ----
function pathTri(p0, p1, p2) {
  ctx.beginPath();
  ctx.moveTo(p0.x, p0.y);
  ctx.lineTo(p1.x, p1.y);
  ctx.lineTo(p2.x, p2.y);
  ctx.closePath();
}

function strokeSeg(a, b) {
  ctx.beginPath();
  ctx.moveTo(a.x, a.y);
  ctx.lineTo(b.x, b.y);
  ctx.stroke();
}

function spectrumColor(t) {
  const n = SPECTRUM.length - 1;
  const x = Math.max(0, Math.min(1, t)) * n;
  const i = Math.min(n - 1, Math.floor(x));
  const f = x - i;
  const a = SPECTRUM[i];
  const b = SPECTRUM[i + 1];
  return [
    Math.round(a[0] + (b[0] - a[0]) * f),
    Math.round(a[1] + (b[1] - a[1]) * f),
    Math.round(a[2] + (b[2] - a[2]) * f),
  ];
}

function lerpPt(a, b, t) { return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t }; }
function sub(a, b) { return { x: a.x - b.x, y: a.y - b.y }; }
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function norm(v) { const m = Math.hypot(v.x, v.y) || 1; return { x: v.x / m, y: v.y / m }; }
function bpx(k) { return (S * k).toFixed(2) + 'px'; }

function radialFill(c, x, y, r, stops) {
  const grad = c.createRadialGradient(x, y, 0, x, y, r);
  for (const [color, stop] of stops) grad.addColorStop(stop, color);
  c.fillStyle = grad;
  c.fillRect(0, 0, W, H);
}

function gGlow(c, x, y, r, color, alpha) {
  const grad = c.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, withAlpha(color, alpha));
  grad.addColorStop(1, withAlpha(color, 0));
  c.fillStyle = grad;
  c.beginPath();
  c.arc(x, y, r, 0, Math.PI * 2);
  c.fill();
}

function withAlpha(color, alpha) {
  if (color[0] === '#') {
    const h = color.replace('#', '');
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }
  const nums = color.replace(/rgba?\(|\)/g, '');
  return `rgba(${nums}, ${alpha})`;
}

function rand(min, max) { return min + rng() * (max - min); }

function mulberry32(seed) {
  return function next() {
    let t = (seed += 0x6d2b79f5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
